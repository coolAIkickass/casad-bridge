# IRC:112-2020 — "Code of Practice for Concrete Road Bridges". Source notes:
# ED checker/dwg_checker_contents/03_Data for Claude Model/Knowledge
# documents/extracted_notes/irc_112_detailing_notes.md

- rule_id: IRC112-T14.2-N7-FOUNDATION-COVER-MIN
  title: Minimum clear cover for foundation elements
  applicable_drawing_types: [ppp]
  applicable_components: [pile, pilecap, pier]
  required_entities: [notes.clear_cover_mm]
  rule_type: deterministic
  formula: {type: min_threshold, field: notes.clear_cover_mm, min_value: 75}
  unit: mm
  severity: error
  category: "Notes"
  message_template: >
    Clear cover {value}mm is below the code minimum. IRC:112-2020 Table
    14.2, Note (7) requires a minimum of {min_value}mm cover for all
    foundations and elements below ground level (pile, pilecap).
  engineering_rationale: >
    Table 14.2's exposure-based cover table (40-75mm depending on exposure
    class) is overridden for below-ground elements specifically — Note (7)
    sets a flat 75mm floor regardless of exposure class, since foundation
    elements are always in contact with soil/groundwater.
  source_reference: "IRC:112-2020, Table 14.2, Note (7), p.120"
  validation_status: implemented
  # Migrated from a hand-written check in comparator.py's _check_notes.
  # notes.clear_cover_mm already existed as a parsed field (added the same
  # session this rule engine was built, via profiles.py's
  # note_float_patterns) — this is a pure migration, no parser change needed.
  # Verified against the seeded-error training pair + a ~22-fixture sweep.

- rule_id: IRC112-17.3.2-PILE-HEAD-CONFINEMENT-ZONE
  title: Pile-head confinement zone length
  applicable_drawing_types: [ppp]
  applicable_components: [pile]
  required_entities: [geometry_from_drawing.pile_diameter_mm]
  rule_type: deterministic
  formula:
    type: formula_ratio
    field: geometry_from_drawing.pile_diameter_mm
    expression: "3 * pile_diameter_mm"
    tolerance_pct: 15
  unit: mm
  severity: error
  category: "Dimension Errors"
  message_template: >
    Pile-head confinement zone length does not match 3x pile diameter
    ({expected_value}mm) per IRC:112-2020 Cl. 17.3.2(3).
  engineering_rationale: >
    A pile may be permitted a plastic hinge only at its head, just below the
    pile cap (IRC:SP:114-2018 Cl. 8.4.6.2(vii)) — Cl. 17.3.2(3) sets the
    confinement zone protecting that hinge at exactly 3x the pile diameter.
    NOT YET EVALUATED (formula_ratio is unimplemented in the Phase 1
    evaluator — see evaluator.py). Also: neither `geometry_from_drawing.
    pile_diameter_mm` nor a clean "confinement zone length" entity exists in
    dxf_extractor.py yet, and this session's own investigation of a real
    training pile found its actual zone breakdown (4 zones: 3000/3000/4000/
    REMAINING mm) doesn't cleanly match this clause's literal 2-zone model
    (head zone + moment-peak zone) — that reconciliation gap needs a
    follow-up session before this rule can be safely evaluated, even once
    formula_ratio support and the entity extraction exist. Registered now so
    the schema/registry mechanism is exercised end-to-end and the gap is
    tracked, not silently forgotten.
  source_reference: "IRC:112-2020, Cl. 17.3.2(3), p.167"
  validation_status: pending_pilot_validation

- rule_id: IRC112-16.2.3-PIER-TIE-MIN-DIAMETER
  title: Pier tie/link minimum diameter
  applicable_drawing_types: [ppp]
  applicable_components: [pier]
  required_entities: [schedule.pier.i.bar_dia_mm]
  rule_type: deterministic
  formula: {type: min_threshold, field: schedule.pier.i.bar_dia_mm, min_value: 8}
  unit: mm
  severity: error
  category: "Reinforcement"
  message_template: >
    Pier tie/link diameter {value}mm is below the minimum permissible per
    IRC:112-2020 Cl. 16.2.3, which requires tie/link diameter to be at least
    max(8mm, 1/4 of the largest longitudinal bar diameter) — {min_value}mm
    is the absolute floor regardless of longitudinal bar size.
  engineering_rationale: >
    Transverse reinforcement (ties/links) confines the concrete core and
    restrains longitudinal bars against buckling under compression; an
    8mm absolute floor exists independent of the 1/4-longitudinal-diameter
    rule (which this rule does not check — that portion needs both the tie
    and longitudinal bar diameters compared as a ratio, not a single
    threshold; see the note on this rule's narrower scope below).
  source_reference: "IRC:112-2020, Cl. 16.2.3, p.143"
  validation_status: implemented
  # Only checks the flat 8mm absolute floor, not the "1/4 x largest
  # longitudinal bar diameter" alternative (whichever is larger governs per
  # the clause) — that portion needs a ratio between two schedule fields
  # (schedule.pier.i.bar_dia_mm vs schedule.pier.g.bar_dia_mm), which the
  # Phase 1/2 evaluator's min_threshold/max_threshold/exact_match formula
  # types can't express (only formula_ratio could, and it remains
  # unimplemented — see IRC112-17.3.2-PILE-HEAD-CONFINEMENT-ZONE above for
  # the same limitation). Verified this session: schedule.pier.i.bar_dia_mm
  # is a reliably flat (non-list) field across every real production
  # fixture surveyed with pier data, all well above 8mm (12-20mm observed).

- rule_id: IRC112-16.2.3-PIER-TIE-MAX-SPACING
  title: Pier tie/link maximum spacing
  applicable_drawing_types: [ppp]
  applicable_components: [pier]
  required_entities: [schedule.pier.i.spacing_mm]
  rule_type: deterministic
  formula: {type: max_threshold, field: schedule.pier.i.spacing_mm, max_value: 200}
  unit: mm
  severity: error
  category: "Reinforcement"
  message_template: >
    Pier tie/link spacing {value}mm exceeds the maximum permissible per
    IRC:112-2020 Cl. 16.2.3, which caps spacing at the least of
    12x smallest longitudinal bar diameter, least column dimension, or
    {max_value}mm — {max_value}mm is the absolute ceiling regardless of the
    other two (typically-larger) limits.
  engineering_rationale: >
    Wider tie spacing reduces confinement effectiveness and increases
    unsupported longitudinal-bar buckling length; the 200mm absolute
    ceiling exists independent of the other two (usually less restrictive)
    limits in the clause.
  source_reference: "IRC:112-2020, Cl. 16.2.3, p.143"
  validation_status: pending_pilot_validation
  # NOT currently evaluable: surveyed every real production fixture this
  # session (same finding as IS2911-6.11.4-PILE-TIE-MIN-SPACING in
  # is2911_pile.yaml) — dxf_extractor.py's schedule extraction never
  # populates spacing_mm for ANY bar mark, pile or pier (always None). This
  # is a systemic gap in one place (the schedule parser), not specific to
  # this rule — fixing it once would unblock both dormant spacing rules in
  # this registry simultaneously.

- rule_id: IRC112-16.2.2-PIER-MAX-LONGITUDINAL-STEEL-RATIO
  title: Pier maximum longitudinal reinforcement ratio
  applicable_drawing_types: [ppp]
  applicable_components: [pier]
  required_entities: [geometry_from_drawing.pier_longitudinal_steel_pct]
  rule_type: deterministic
  formula: {type: max_threshold, field: geometry_from_drawing.pier_longitudinal_steel_pct, max_value: 4.0}
  unit: "%"
  severity: error
  category: "Reinforcement"
  message_template: >
    Pier longitudinal reinforcement is {value}% of gross cross-section area
    — above the maximum permissible per IRC:112-2020 Cl. 16.2.2, which caps
    longitudinal steel at {max_value}% of Ac outside lap zones (8% is
    permitted at lap sections specifically).
  engineering_rationale: >
    Excess longitudinal steel causes congestion that impairs concrete
    placement/compaction around bars and increases the section's flexural
    over-strength beyond what capacity design assumed for the pier (the
    intended ductile, energy-dissipating element) — undermining the
    capacity-design hierarchy the whole substructure design depends on.
  source_reference: "IRC:112-2020, Cl. 16.2.2, p.142"
  validation_status: pending_pilot_validation
  # NOT currently evaluable: this is a computed ratio (total longitudinal
  # bar area from schedule.pier.g / gross pier cross-section area), not a
  # single field dxf_extractor.py produces directly — same category of gap
  # as IS2911-6.11.1-PILE-MIN-LONGITUDINAL-STEEL-PCT in is2911_pile.yaml
  # (needs either a new evaluator formula type for cross-schedule ratios, or
  # dxf_extractor.py pre-computing and exposing this percentage directly).
  # As.min = max(0.10*NEd/fyd, 0.002*Ac) (the companion minimum-reinforcement
  # rule in the same clause) is NOT registered here at all — it depends on
  # NEd (design axial force), which is a design-calculation output no
  # drawing shows, so it can never be a pure drawing-vs-code check the way
  # this maximum can.

- rule_id: IRC112-17.2.1.3-PIER-CONFINEMENT-TIE-SPACING-RATIO
  title: Pier confinement-zone tie spacing (ductile detailing)
  applicable_drawing_types: [ppp]
  applicable_components: [pier]
  required_entities: [schedule.pier.i.spacing_mm, schedule.pier.g.bar_dia_mm]
  rule_type: deterministic
  formula:
    type: formula_ratio
    field: schedule.pier.g.bar_dia_mm
    expression: "5 * bar_dia_mm"
    tolerance_pct: 0
    comparison: max
    compare_field: schedule.pier.i.spacing_mm
  unit: mm
  severity: error
  category: "Reinforcement"
  message_template: >
    Confinement-zone tie spacing exceeds 5x the smallest longitudinal bar
    diameter per IRC:112-2020 Cl. 17.2.1.3 (within the plastic hinge
    region specifically — this rule cannot currently distinguish hinge-zone
    ties from ordinary-zone ties, see note below).
  engineering_rationale: >
    Inside a confirmed plastic hinge region, tie spacing must be tight
    enough (<=5x the smallest longitudinal bar diameter, and also
    <=1/5 of the confined core dimension, whichever governs) to
    effectively confine the core concrete and restrain longitudinal bars
    against buckling during cyclic post-yield deformation — ordinary
    (non-seismic) tie spacing is inadequate for this purpose.
  source_reference: "IRC:112-2020, Cl. 17.2.1.3, p.162"
  validation_status: pending_pilot_validation
  # Doubly blocked: (1) formula_ratio is unimplemented in the evaluator
  # (same limitation noted on every other formula_ratio rule in this
  # registry), and (2) even once implemented, this specific clause only
  # applies WITHIN the confirmed plastic hinge region — the schedule doesn't
  # currently distinguish "this tie mark's zone is the hinge zone" from
  # "this tie mark's zone is elsewhere on the pier," so applying this
  # formula to schedule.pier.i (whichever zone that happens to be) risks
  # checking the wrong zone entirely, or the right zone under the wrong
  # name if a pier uses i/i1/i2 zone marks. A hinge-zone-identification
  # entity would be needed first. Registered for traceability, not close to
  # ready.

- rule_id: IRC112-17.2.3-NO-LAP-IN-PLASTIC-HINGE
  title: No lap/weld splices within a plastic hinge region
  applicable_drawing_types: [ppp]
  applicable_components: [pier, pile]
  required_entities: [schedule.pier]
  rule_type: judgment
  category: "Dimension Errors"
  reasoning_prompt: >
    Look at the pier base (or pile head) region where confinement/ductile
    detailing is shown (tighter tie spacing, a labelled hinge/confinement
    zone). Does any longitudinal bar's lap splice or weld splice symbol fall
    within that zone? If so, flag it — lap/weld splices are not permitted
    inside a plastic hinge region.
  engineering_rationale: >
    A splice is a weaker point than continuous bar; if it falls where the
    section is expected to yield cyclically during an earthquake, splice
    failure could occur before the intended ductile flexural failure mode
    — defeating the entire capacity-design premise. Stated identically in
    two companion codes: IRC:112 Cl. 17.2.3 ("Lap or weld splicing of
    longitudinal reinforcement is NOT allowed within the plastic hinge
    region") and IRC:SP:114-2018 Cl. 9.1.4.1.
  source_reference: "IRC:112-2020, Cl. 17.2.3, p.166; IRC:SP:114-2018, Cl. 9.1.4.1, p.76"
  validation_status: needs_real_example

- rule_id: IRC112-17.3.1-PILECAP-DUCTILE-EXEMPTION
  title: Pilecap should not show unwarranted seismic ductile detailing
  applicable_drawing_types: [ppp]
  applicable_components: [pilecap]
  required_entities: [schedule.pilecap]
  rule_type: judgment
  category: "Dimension Errors"
  reasoning_prompt: >
    Does this pilecap's stirrup/tie reinforcement show varying spacing
    zones similar to a pier or pile confinement pattern? If so, and there's
    no punching-shear justification (piles not concentrated near the zoned
    region), flag as possibly-unwarranted ductile detailing — pilecaps are
    exempt from seismic ductile detailing per IRC:112.
  engineering_rationale: >
    IRC:112 Cl. 17.3.1 exempts pilecaps/spread foundations from ductile
    detailing entirely — they're designed to remain elastic under capacity
    design (piers are the intended energy-dissipating element). A pilecap
    showing multi-zone confinement-style tie spacing suggests either
    drafting error (pier/pile convention applied by mistake) or a genuine
    punching-shear zoning pattern being misread as seismic detailing — the
    two are visually similar but serve unrelated purposes.
  source_reference: "IRC:112-2020, Cl. 17.3.1, p.166"
  validation_status: needs_real_example
  # This is check #3 from earlier this session, declined as a hard
  # deterministic check for lack of any real fixture showing the pattern
  # (every real pilecap schedule surveyed uses a flat, unzoned mark set —
  # a, b, c, d, e, f, f1 — never e1/e2). Reopened here as a judgment rule:
  # the vision review pass already operates in "flag only if certain, omit
  # otherwise" mode, which is the right confidence regime for an inexact,
  # unvalidated rule like this one — it doesn't need the same "proven
  # against a real case or don't ship" bar a hard deterministic check does.

- rule_id: IRC112-15.2.7-BUNDLED-BAR-DIAMETER-RATIO
  title: Bundled longitudinal bar diameter ratio
  applicable_drawing_types: [ppp]
  applicable_components: [pile, pier]
  required_entities: [schedule.pile]
  rule_type: judgment
  category: "Reinforcement"
  reasoning_prompt: >
    CASAD sometimes bundles two longitudinal bar marks together (e.g. a
    pile's "x" and "x1" bars shown as "x+x1 (BUNDLED BAR)" in a
    cross-section, or similarly for pier longitudinal bars). Where the
    drawing explicitly shows two different bar marks bundled together, read
    BOTH diameters as printed numeric text in the reinforcement schedule
    (e.g. "25" or "25 O" in the bar-diameter column) — do not estimate or
    infer a diameter from the bar's drawn size. Only flag if you can read
    both printed diameter values with certainty AND their ratio (larger
    divided by smaller) is clearly above 1.7. If either value is illegible,
    or the two marks turn out to have the same diameter, do not flag.
  engineering_rationale: >
    Bundled bars are treated in design as one equivalent bar of diameter
    phi_n = phi*sqrt(nb); mixing diameters that differ too much breaks the
    assumption that the bundle acts compositely and shares bond stress
    evenly, so IRC:112 caps the ratio between bundled bar diameters at 1.7.
  source_reference: "IRC:112-2020, Cl. 15.2.7, p.134"
  validation_status: needs_real_example
  # Not made deterministic: identifying WHICH two schedule marks are
  # bundled together on a given drawing is itself a visual/textual
  # judgment call (CASAD's own convention isn't a fixed mark-name pair —
  # see casad_design_philosophy_notes.md's finding that pile bundling uses
  # x+x1 in one worked example with no guarantee that's universal), not
  # something the schema's formula vocabulary can express generically.
  #
  # Observed false positive during Phase 3 verification (against the
  # capsule-pier "With Errors" pile fixture, ground truth via direct
  # dxf_extractor schedule read: x=25mm, x1=25mm, ratio=1.0): the vision
  # model claimed "the ratio exceeds 1.7x threshold" with no such mismatch
  # actually present. Tightened reasoning_prompt in response (require
  # reading both diameters as printed text, omit on any uncertainty) —
  # re-ran 1x after the fix, finding did not reappear, but this rule
  # remains the highest hallucination-risk one in the registry (it asks
  # for a precise two-number numeric comparison from a compressed/rendered
  # image, unlike the more qualitative "does this pattern look off" rules)
  # and should get extra scrutiny in any future pilot-validation pass.

- rule_id: IRC112-16.2.3-PIER-TIE-CORNER-RESTRAINT
  title: Pier longitudinal bars must be individually restrained by ties
  applicable_drawing_types: [ppp]
  applicable_components: [pier]
  required_entities: [schedule.pier]
  rule_type: judgment
  category: "Reinforcement"
  reasoning_prompt: >
    Look at the pier cross-section showing the tie/link layout around the
    longitudinal bar ring. Only flag a clear, unambiguous violation, not a
    borderline case: (a) a corner bar with no tie leg or cross-tie
    engaging it at all, or (b) more than 5 longitudinal bars secured at
    one corner by a single set of ties across two meeting faces (or more
    than 3 bars on one face), or (c) a longitudinal bar that is obviously
    far — much further than the spacing of its neighbours — from any
    restrained bar.
  engineering_rationale: >
    Every longitudinal bar in a column/pier must be individually
    restrained against outward buckling under compression; IRC:112
    Cl. 16.2.3 caps how many bars a single tie-corner may secure (3 on one
    face / 5 on two faces) and requires no compression bar be more than
    150mm from a restrained bar — an unrestrained bar can buckle outward
    and spall its cover under load.
  source_reference: "IRC:112-2020, Cl. 16.2.3, p.143"
  validation_status: needs_real_example

- rule_id: IRC112-15.2.6-LARGE-DIA-BAR-LAP-RESTRICTION
  title: Large-diameter bars (>32mm) restricted from lap splicing
  applicable_drawing_types: [ppp]
  applicable_components: [pier, pile]
  required_entities: [schedule.pier]
  rule_type: judgment
  category: "Reinforcement"
  reasoning_prompt: >
    Check the reinforcement schedule for any pier or pile longitudinal
    bar mark with a diameter greater than 32mm. If such a bar is shown
    with a lap splice (in the schedule's shape/notes column, or visible
    in an elevation/section view), check whether the member's minimum
    cross-sectional dimension (pier diameter/width, or pile diameter) is
    at least 1.0m. If the member is smaller than 1.0m and a lap splice is
    shown on a >32mm bar, flag it.
  engineering_rationale: >
    Bars thicker than 32mm develop much higher bond-transfer forces over a
    lap length than the code's general lap-length formula safely covers;
    IRC:112 Cl. 15.2.6 disallows lap splicing such bars unless the member
    is large enough (>=1.0m least dimension) or the bar stress is kept
    below 80% of design ultimate strength.
  source_reference: "IRC:112-2020, Cl. 15.2.6, p.133"
  validation_status: needs_real_example
